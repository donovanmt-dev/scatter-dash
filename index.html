<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Dash — Scatter Plot Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --surface: #ffffff;
    --surface2: #f0ebe4;
    --border: #e0d8cf;
    --ink: #1a1410;
    --ink2: #5a4f44;
    --ink3: #9a8f84;
    --teal: #0f7c6e;
    --teal-light: #e0f2ef;
    --amber: #c4700a;
    --amber-light: #fef3e2;
    --red: #c0392b;
    --red-light: #fde8e6;
    --green: #1a7a4a;
    --green-light: #e3f5ec;
    --dot: #0f7c6e;
    --line: #c4700a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .game-title {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .game-title span { color: var(--teal); }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats-row {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    text-align: center;
    min-width: 90px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-value.teal { color: var(--teal); }
  .stat-value.amber { color: var(--amber); }

  .progress-bar {
    width: 100%;
    max-width: 600px;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 600px;
  }

  .round-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .context-text {
    font-size: 0.95rem;
    color: var(--ink2);
    line-height: 1.55;
    margin-bottom: 1rem;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--teal);
  }

  .context-text strong { color: var(--ink); font-weight: 500; }

  canvas {
    display: block;
    margin: 0 auto 1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fafaf8;
  }

  .question-text {
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .question-text em {
    font-style: normal;
    color: var(--amber);
    font-weight: 700;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 13px 12px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, transform 0.08s;
    text-align: center;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
  }

  .choice-btn:active:not(:disabled) { transform: translateY(0); }
  .choice-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .choice-btn.wrong   { background: var(--red-light);   border-color: var(--red);   color: var(--red); }
  .choice-btn.reveal  { background: var(--green-light); border-color: var(--green); color: var(--green); opacity: 0.7; }
  .choice-btn:disabled { cursor: default; }

  .feedback-area {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .feedback-msg {
    font-size: 0.95rem;
    font-weight: 500;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .feedback-msg.show { opacity: 1; }
  .feedback-msg.correct { color: var(--green); }
  .feedback-msg.wrong   { color: var(--red); }

  .hint-text {
    font-size: 0.82rem;
    color: var(--ink2);
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s;
    line-height: 1.55;
    max-width: 440px;
    padding: 8px 12px;
    background: var(--amber-light);
    border-radius: 8px;
    border-left: 3px solid var(--amber);
  }

  .hint-text.show { opacity: 1; }

  .next-btn {
    display: none;
    margin: 0.75rem auto 0;
    background: var(--teal);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 12px 32px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.12s, transform 0.08s;
  }

  .next-btn:hover { background: #0a5f54; transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0); }
  .next-btn.visible { display: block; }

  .end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1rem;
    padding: 1rem;
  }

    font-size: 5rem;
    font-weight: 500;
    color: var(--teal);
    line-height: 1;
  }

  .end-label { font-size: 1rem; color: var(--ink2); }

    font-size: 1.05rem;
    color: var(--ink);
    font-weight: 500;
    max-width: 380px;
    line-height: 1.6;
  }

  .breakdown {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 8px;

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;

  .breakdown-result.ok   { color: var(--green); }
  .breakdown-result.miss { color: var(--red); }

  .restart-btn {
    background: var(--teal);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 14px 36px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.12s;
  }

  .restart-btn:hover { background: #0a5f54; }
</style>
</head>

<script>
// ── CANVAS HELPERS ────────────────────────────────────────────────────────────
function drawScatter(ctx, W, H, xLabel, yLabel, xMin, xMax, yMin, yMax,
                     points, slope, intercept, highlightX, choices) {
  const LM=58, RM=W-20, TM=22, BM=H-42;
  const xRange = xMax-xMin, yRange = yMax-yMin;

  function gx(v){ return LM + (v-xMin)/xRange*(RM-LM); }
  function gy(v){ return BM - (v-yMin)/yRange*(BM-TM); }

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fafaf8';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#e8e4de'; ctx.lineWidth=0.5;
  const xStep = Math.ceil(xRange/6);
  const yStep = Math.ceil(yRange/5);
  for(let x=xMin;x<=xMax;x+=xStep){
    ctx.beginPath(); ctx.moveTo(gx(x),TM); ctx.lineTo(gx(x),BM); ctx.stroke();
  }
  for(let y=yMin;y<=yMax;y+=yStep){
    ctx.beginPath(); ctx.moveTo(LM,gy(y)); ctx.lineTo(RM,gy(y)); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(LM,BM); ctx.lineTo(RM+4,BM); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(LM,TM-4); ctx.lineTo(LM,BM); ctx.stroke();

  // Axis ticks + labels
  ctx.fillStyle='#666'; ctx.font='10px DM Sans,sans-serif'; ctx.textAlign='center';
  for(let x=xMin;x<=xMax;x+=xStep){
    ctx.fillText(x, gx(x), BM+14);
    ctx.strokeStyle='#888'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(gx(x),BM-2); ctx.lineTo(gx(x),BM+2); ctx.stroke();
  }
  ctx.textAlign='right';
  for(let y=yMin;y<=yMax;y+=yStep){
    ctx.fillText(y, LM-5, gy(y)+4);
    ctx.strokeStyle='#888'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(LM-2,gy(y)); ctx.lineTo(LM+2,gy(y)); ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle='#555'; ctx.font='11px DM Sans,sans-serif'; ctx.textAlign='center';
  ctx.fillText(xLabel, (LM+RM)/2, H-4);
  ctx.save(); ctx.translate(12,(TM+BM)/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(yLabel, 0, 0); ctx.restore();

  // Line of best fit
  ctx.strokeStyle='#c4700a'; ctx.lineWidth=2.5; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(gx(xMin), gy(slope*xMin+intercept));
  ctx.lineTo(gx(xMax), gy(slope*xMax+intercept));
  ctx.stroke();

  // Data points
  points.forEach(([x,y]) => {
    ctx.fillStyle='#0f7c6e';
    ctx.beginPath(); ctx.arc(gx(x),gy(y),5.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(gx(x),gy(y),5.5,0,Math.PI*2); ctx.stroke();
  });


}

// ── GAME STATE ────────────────────────────────────────────────────────────────
let questions = [], current = 0, score = 0, streak = 0, results = [], answered = false;

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');

  drawScatter(ctx, canvas.width, canvas.height,
    q.xLabel, q.yLabel, q.xMin, q.xMax, q.yMin, q.yMax,
    q.points, q.slope, q.intercept, q.highlightX, q.choices);

  document.getElementById('context-text').innerHTML = q.context;
  document.getElementById('question-text').innerHTML = q.question;
  document.getElementById('round-label').textContent = 'Round ' + (current+1);
  document.getElementById('round-stat').textContent = (current+1) + ' / ' + questions.length;
  document.getElementById('progress').style.width = (current/questions.length*100)+'%';

  const shuffledChoices = shuffle(q.choices);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  shuffledChoices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => handleAnswer(choice, btn, shuffledChoices);
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback-msg';
  document.getElementById('feedback').textContent = '';
  document.getElementById('hint').className = 'hint-text';
  document.getElementById('hint').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';
}

function handleAnswer(choice, btn, allChoices) {
  if(answered) return;
  answered = true;
  const q = questions[current];
  const correct = choice == q.answer;

  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if(b.textContent == q.answer) b.classList.add(correct ? 'correct' : 'reveal');
  });
  if(!correct) btn.classList.add('wrong');

  const fb = document.getElementById('feedback');
  const hint = document.getElementById('hint');

  if(correct) {
    score++; streak++;
    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;
    fb.textContent = streak >= 3 ? 'Correct! ' + streak + ' in a row!' : 'Correct!';
    fb.className = 'feedback-msg correct show';
  } else {
    streak = 0;
    document.getElementById('streak').textContent = 0;
    fb.textContent = 'Not quite — the answer is ' + q.answer + '.';
    fb.className = 'feedback-msg wrong show';
  }

  hint.textContent = 'Work: ' + q.work;
  hint.className = 'hint-text show';
  document.getElementById('next-btn').className = 'next-btn visible';
  results.push({ q: 'Round '+(current+1), correct, answer: q.answer, chosen: choice });
}

function nextQuestion() {
  current++;
  if(current >= questions.length) showEnd();
  else loadQuestion();
}

function showEnd() {
  document.getElementById('game-card').style.display = 'none';
  document.getElementById('progress').style.width = '100%';
  const end = document.getElementById('end-screen');
  end.className = 'end-screen show';
  document.getElementById('end-score').textContent = score;
  const pct = score/questions.length;
  let msg = '';
  if(pct === 1) msg = 'Perfect score! You can read any line of best fit.';
  else if(pct >= 0.8) msg = 'Great work! You have a strong handle on predictions.';
  else if(pct >= 0.6) msg = 'Good effort — review the work shown for the ones you missed.';
  else msg = 'Keep practicing. Check the work hints to build the skill.';
  document.getElementById('end-message').textContent = msg;
  const bd = document.getElementById('breakdown');
  bd.innerHTML = '';
  results.forEach((r,i) => {
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = '<span class="breakdown-name">Round '+(i+1)+': answer = '+r.answer+'</span>'
      +'<span class="breakdown-result '+(r.correct?'ok':'miss')+'">'+(r.correct?'correct':'missed')+'</span>';
    bd.appendChild(row);
  });
}

function restart() {
  score=0; streak=0; current=0; results=[];
  document.getElementById('score').textContent=0;
  document.getElementById('streak').textContent=0;
  document.getElementById('end-screen').className='end-screen';
  document.getElementById('game-card').style.display='block';
  questions = shuffle(QUESTIONS);
  loadQuestion();
}

document.getElementById('next-btn').addEventListener('click', nextQuestion);
questions = shuffle(QUESTIONS);
loadQuestion();
</script>
</body>
</html>
